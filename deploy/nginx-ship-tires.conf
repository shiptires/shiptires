# Ship.Tires — Nginx reverse proxy
# Place at /etc/nginx/sites-available/ship-tires
# Symlink to /etc/nginx/sites-enabled/ship-tires

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ship.tires www.ship.tires;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ship.tires www.ship.tires;

    # SSL certs — managed by certbot
    ssl_certificate /etc/letsencrypt/live/ship.tires/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ship.tires/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve local tire images directly via nginx (bypass Node.js)
    location /images/ {
        alias /opt/ship-tires/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3200;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    client_max_body_size 10M;
}
